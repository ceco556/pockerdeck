# Minimal compose file for the server — no source code needed.
#
# 1. Copy this file to your server:
#    scp docker-compose.server.yml root@<IP>:~/pockerdeck/docker-compose.yml
# 2. Run: docker compose pull && docker compose up -d
#
# Change the port mapping below if 8000 is already in use on your server.

services:
  web:
    image: your-dockerhub-username/pockerdeck:latest
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
